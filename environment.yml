name: gt-dashboard-env

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ─────────────────────────────────────────────────────────────────
  - python=3.11.9

  # ── Core Data Science (conda-forge) ────────────────────────────────────────
  - pandas=2.2.2
  - numpy=1.26.4
  - scikit-learn=1.5.1
  - plotly=5.23.0

  # ── Pip-only packages ────────────────────────────────────────────────────────
  - pip:
    # Streamlit core & UI extensions
    - streamlit==1.37.1
    - streamlit-shadcn-ui==0.3.3
    - streamlit-lottie==0.0.5

    # Google Gemini API
    - google-generativeai==0.7.2

    # Utilities
    - python-dotenv==1.0.1
    - openpyxl==3.1.5
    - xlsxwriter==3.2.0

    # Dev & Testing
    - pytest==8.3.2
    - pytest-cov==5.0.0
    - black==24.8.0
    - flake8==7.1.1
